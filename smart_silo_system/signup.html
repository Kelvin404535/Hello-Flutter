<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Smart Silo System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-image: url('https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        
        .signup-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            font-size: 14px;
            color: white;
            transition: all 0.3s ease;
            outline: none;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        select option {
            background: #2c3e50;
            color: white;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: rgba(46, 213, 115, 0.8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            background: rgba(46, 213, 115, 1);
            transform: scale(1.02);
        }
        
        .error-list {
            background: rgba(231, 76, 60, 0.9);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .error-list ul {
            margin-left: 20px;
        }
        
        .links {
            margin-top: 20px;
            text-align: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 13px;
        }
        
        .links a:hover {
            color: white;
            text-decoration: underline;
        }
        
        .icon {
            text-align: center;
            font-size: 50px;
            margin-bottom: 15px;
        }
        
        .requirements {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }
        
        @media (max-width: 550px) {
            .signup-container {
                padding: 25px;
                width: 95%;
            }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="icon">🌾</div>
        <h1>Create Account</h1>
        <div class="subtitle">Join Smart Silo Management System</div>
        
        {% if errors %}
        <div class="error-list">
            <ul>
                {% for error in errors %}
                <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <input type="text" name="full_name" placeholder="Full Name" value="{{ form_data.full_name or '' }}" required>
            </div>
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" value="{{ form_data.username or '' }}" required>
                <div class="requirements">At least 3 characters</div>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" value="{{ form_data.email or '' }}" required>
            </div>
            <div class="form-group">
                <input type="tel" name="phone" placeholder="Phone Number (optional)" value="{{ form_data.phone or '' }}">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
                <div class="requirements">8+ chars, uppercase, lowercase, number, special character</div>
            </div>
            <div class="form-group">
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            </div>
            <div class="form-group">
                <select name="role">
                    <option value="staff">Staff</option>
                    <option value="silo_manager">Silo Manager</option>
                    <option value="farmer">Farmer</option>
                </select>
            </div>
            <button type="submit">Sign Up →</button>
        </form>
        
        <div class="links">
            <a href="/login">← Already have an account? Sign In</a>
        </div>
    </div>
</body>
</html>
