<!DOCTYPE html>
<html>
<head>
    <title>Registration Success - Smart Silo System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-image: url('https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=1600');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        .success-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 1;
        }
        h2 { color: white; margin-bottom: 15px; }
        p { color: rgba(255,255,255,0.8); margin-bottom: 20px; line-height: 1.6; }
        .btn { background: #10b981; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; display: inline-block; }
        .btn:hover { background: #059669; transform: scale(1.02); }
        .icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="icon">📧</div>
        <h2>Registration Successful!</h2>
        <p>We've sent a verification email to <strong>{{ email }}</strong>.</p>
        <p>Please check your inbox and click the verification link to activate your account.</p>
        <a href="/login" class="btn">Go to Login →</a>
    </div>
</body>
</html>
