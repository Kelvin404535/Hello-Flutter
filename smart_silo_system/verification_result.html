<!DOCTYPE html>
<html>
<head>
    <title>Email Verification - Smart Silo System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-image: url('https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=1600');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        .result-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 1;
        }
        h2 { color: white; margin-bottom: 15px; }
        p { color: rgba(255,255,255,0.8); margin-bottom: 20px; }
        .btn { background: #10b981; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; display: inline-block; }
        .btn:hover { background: #059669; }
        .icon { font-size: 60px; margin-bottom: 20px; }
        .success-icon { color: #10b981; }
        .error-icon { color: #ef4444; }
    </style>
</head>
<body>
    <div class="result-container">
        {% if success %}
        <div class="icon success-icon">✅</div>
        <h2>Email Verified!</h2>
        <p>{{ message }}</p>
        <a href="/login" class="btn">Login Now →</a>
        {% else %}
        <div class="icon error-icon">❌</div>
        <h2>Verification Failed</h2>
        <p>{{ message }}</p>
        <a href="/signup" class="btn">Try Again →</a>
        {% endif %}
    </div>
</body>
</html>
